name: Kuchibi

options:
  bundleIdPrefix: com.kuchibi
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  SettingsAccess:
    url: https://github.com/orchetect/SettingsAccess
    from: "2.1.0"
  WhisperCppKit:
    path: Packages/WhisperCppKit

targets:
  Kuchibi:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: HotKey
      - package: WhisperKit
      - package: SettingsAccess
      - package: WhisperCppKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kuchibi.app
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # WhisperCppKit が `whisper` (binaryTarget) を再エクスポートしているが、
        # SwiftPM の binaryTarget は consumer 側の link line に伝播しないことが
        # 観測されたため (test target 経由の再 link で `-framework whisper` が落ちる)、
        # `OTHER_LDFLAGS` で明示的に whisper.framework をリンクする。
        OTHER_LDFLAGS: $(inherited) -framework whisper

  KuchibiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Kuchibi
      - package: WhisperCppKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
