name: Kuchibi

options:
  bundleIdPrefix: com.kuchibi
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  SettingsAccess:
    url: https://github.com/orchetect/SettingsAccess
    from: "2.1.0"

targets:
  Kuchibi:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: HotKey
      - package: WhisperKit
      - package: SettingsAccess
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kuchibi.app
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  KuchibiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Kuchibi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
